<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 仪表板 - 投资追踪</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f7fa; }
        .navbar { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .navbar h1 { color: white; font-size: 1.5rem; }
        .navbar nav { display: flex; gap: 1.5rem; }
        .navbar nav a { color: rgba(255,255,255,0.8); text-decoration: none; transition: color 0.3s; }
        .navbar nav a:hover, .navbar nav a.active { color: #00D4AA; }
        .navbar .user-info { color: rgba(255,255,255,0.8); display: flex; align-items: center; gap: 1rem; }
        .navbar .logout-btn { background: rgba(255,255,255,0.1); color: white; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .stat-card .label { color: #718096; font-size: 0.9rem; margin-bottom: 0.5rem; }
        .stat-card .value { font-size: 1.8rem; font-weight: bold; color: #2d3748; }
        .stat-card .value.positive { color: #38a169; }
        .stat-card .value.negative { color: #e53e3e; }
        .card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card h2 { color: #4a5568; font-size: 1.2rem; margin-bottom: 1rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f7fafc; color: #4a5568; font-weight: 600; }
        tr:hover { background: #f7fafc; }
        .positive { color: #38a169; }
        .negative { color: #e53e3e; }
        .btn { padding: 0.5rem 1rem; border-radius: 6px; text-decoration: none; font-size: 0.9rem; cursor: pointer; border: none; }
        .btn-primary { background: #00D4AA; color: white; }
        .btn-danger { background: #e53e3e; color: white; }
        .hint { background: #f0f4ff; padding: 1rem; border-radius: 8px; border-left: 4px solid #00D4AA; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>📊 投资追踪</h1>
        <nav>
            <a href="/dashboard" class="active">仪表板</a>
            <a href="/holdings">持仓</a>
            <a href="/transactions">交易</a>
            <a href="/watchlist">观察</a>
            <a href="/journal">日记</a>
            <a href="/risk">风险</a>
        </nav>
        <div class="user-info">
            <span id="username">用户</span>
            <button class="logout-btn" onclick="logout()">退出</button>
        </div>
    </div>
    
    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">总资产</div>
                <div class="value" id="total-value">¥0.00</div>
            </div>
            <div class="stat-card">
                <div class="label">总成本</div>
                <div class="value" id="total-cost">¥0.00</div>
            </div>
            <div class="stat-card">
                <div class="label">总盈亏</div>
                <div class="value" id="total-gain">¥0.00</div>
            </div>
            <div class="stat-card">
                <div class="label">收益率</div>
                <div class="value" id="total-percent">0.00%</div>
            </div>
        </div>
        
        <div class="card">
            <h2>📈 持仓概览</h2>
            <table>
                <thead>
                    <tr>
                        <th>代码</th>
                        <th>名称</th>
                        <th>持仓</th>
                        <th>成本价</th>
                        <th>现价</th>
                        <th>市值</th>
                        <th>盈亏</th>
                    </tr>
                </thead>
                <tbody id="holdings-body"></tbody>
            </table>
            <div class="hint">
                <p>💡 在「持仓」页面添加你的持仓，系统会自动获取实时股价</p>
            </div>
        </div>
    </div>

    <script>
        async function checkAuth() {
            const res = await fetch('/api/check_auth');
            if (!res.ok) { window.location.href = '/login'; return; }
            const data = await res.json();
            document.getElementById('username').textContent = data.user.username;
        }
        
        async function loadHoldings() {
            const res = await fetch('/api/holdings');
            if (!res.ok) return;
            const holdings = await res.json();
            
            let totalValue = 0, totalCost = 0;
            const tbody = document.getElementById('holdings-body');
            tbody.innerHTML = '';
            
            for (const h of holdings) {
                totalValue += h.current_value || 0;
                totalCost += h.cost_basis * h.quantity;
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${h.symbol}</strong></td>
                    <td>${h.name || '-'}</td>
                    <td>${h.quantity.toFixed(2)}</td>
                    <td>¥${h.cost_basis.toFixed(2)}</td>
                    <td>¥${(h.current_price || 0).toFixed(2)}</td>
                    <td>¥${(h.current_value || 0).toFixed(2)}</td>
                    <td class="${h.gain >= 0 ? 'positive' : 'negative'}">
                        ${h.gain >= 0 ? '+' : ''}¥${(h.gain || 0).toFixed(2)} (${(h.gain_percent || 0).toFixed(2)}%)
                    </td>
                `;
                tbody.appendChild(tr);
            }
            
            const totalGain = totalValue - totalCost;
            const totalPercent = totalCost > 0 ? (totalGain / totalCost * 100) : 0;
            
            document.getElementById('total-value').textContent = '¥' + totalValue.toFixed(2);
            document.getElementById('total-cost').textContent = '¥' + totalCost.toFixed(2);
            const gainEl = document.getElementById('total-gain');
            gainEl.textContent = (totalGain >= 0 ? '+' : '') + '¥' + totalGain.toFixed(2);
            gainEl.className = 'value ' + (totalGain >= 0 ? 'positive' : 'negative');
            const percentEl = document.getElementById('total-percent');
            percentEl.textContent = (totalPercent >= 0 ? '+' : '') + totalPercent.toFixed(2) + '%';
            percentEl.className = 'value ' + (totalPercent >= 0 ? 'positive' : 'negative');
        }
        
        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login';
        }
        
        checkAuth();
        loadHoldings();
    </script>
</body>
</html>
